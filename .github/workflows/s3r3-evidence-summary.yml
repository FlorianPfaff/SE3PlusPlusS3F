name: S3R3 Evidence Summary

permissions:
  contents: read

# jscpd:ignore-start
on:
  workflow_dispatch:
    inputs:
      grid_sizes:
        description: Space-separated quaternion grid sizes.
        required: true
        default: "8 16 32"
        type: string
      reference_grid_size:
        description: Dense baseline S3F reference grid size.
        required: true
        default: 64
        type: number
      trials:
        description: Synthetic trials used for the evidence summary.
        required: true
        default: 8
        type: number
      steps:
        description: Prediction/update steps in each trial.
        required: true
        default: 8
        type: number
      seed:
        description: Random seed for synthetic trial generation.
        required: true
        default: 29
        type: number
      cell_sample_count:
        description: Local tangent samples used for each quaternion cell.
        required: true
        default: 27
        type: number
      retention_days:
        description: Days to retain the uploaded report artifact.
        required: true
        default: 30
        type: number
# jscpd:ignore-end

concurrency:
  group: s3r3-evidence-summary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  s3r3-evidence-summary:
    name: Build S3R3 evidence summary
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # jscpd:ignore-start
    env:
      GRID_SIZES: ${{ inputs.grid_sizes }}
      REFERENCE_GRID_SIZE: ${{ inputs.reference_grid_size }}
      TRIALS: ${{ inputs.trials }}
      STEPS: ${{ inputs.steps }}
      SEED: ${{ inputs.seed }}
      CELL_SAMPLE_COUNT: ${{ inputs.cell_sample_count }}
      OUTPUT_DIR: results/s3r3_evidence_summary
    # jscpd:ignore-end

    steps:
      # jscpd:ignore-start
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # jscpd:ignore-end
      - name: Run and validate evidence summary
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          import subprocess
          import sys
          from pathlib import Path

          def positive_int_list(name):
              values = [int(token) for token in os.environ[name].split()]
              if not values or min(values) <= 0:
                  raise ValueError(f"{name} must contain positive integers.")
              return values

          grid_sizes = positive_int_list("GRID_SIZES")
          reference_grid_size = int(os.environ["REFERENCE_GRID_SIZE"])
          if reference_grid_size <= max(grid_sizes):
              raise ValueError("REFERENCE_GRID_SIZE must be larger than every grid size.")
          for scalar_name in ("TRIALS", "STEPS", "SEED", "CELL_SAMPLE_COUNT"):
              int(os.environ[scalar_name])

          command = [
              sys.executable,
              "-m",
              "se3plusplus_s3f.cli",
              "s3r3-evidence-summary",
              "--grid-sizes",
              *(str(value) for value in grid_sizes),
              "--reference-grid-size",
              str(reference_grid_size),
              "--trials",
              os.environ["TRIALS"],
              "--steps",
              os.environ["STEPS"],
              "--seed",
              os.environ["SEED"],
              "--cell-sample-count",
              os.environ["CELL_SAMPLE_COUNT"],
              "--output-dir",
              os.environ["OUTPUT_DIR"],
          ]
          subprocess.run(command, check=True)

          output_dir = Path(os.environ["OUTPUT_DIR"])
          files = {
              "claims": output_dir / "s3r3_evidence_claims.csv",
              "highres": output_dir / "s3r3_evidence_highres_metrics.csv",
              "relaxed": output_dir / "s3r3_evidence_relaxed_metrics.csv",
              "metadata": output_dir / "run_metadata.json",
              "note": output_dir / "s3r3_evidence_summary_note.md",
              "gain_plot": output_dir / "s3r3_evidence_rmse_gains.png",
              "nees_plot": output_dir / "s3r3_evidence_nees_ratios.png",
          }
          missing = [name for name, path in files.items() if not path.exists()]
          if missing:
              raise FileNotFoundError(missing)

          expected_metric_rows = 3 * len(grid_sizes)
          relaxed_rows = list(csv.DictReader(files["relaxed"].open(newline="", encoding="utf-8")))
          highres_rows = list(csv.DictReader(files["highres"].open(newline="", encoding="utf-8")))
          claim_rows = list(csv.DictReader(files["claims"].open(newline="", encoding="utf-8")))
          if len(relaxed_rows) != expected_metric_rows or len(highres_rows) != expected_metric_rows:
              raise AssertionError((len(relaxed_rows), len(highres_rows), expected_metric_rows))
          if len(claim_rows) != 3 * len(grid_sizes):
              raise AssertionError((len(claim_rows), 3 * len(grid_sizes)))

          for row in claim_rows:
              if row["candidate_variant"] != "r1_r2":
                  raise AssertionError(row)
              for column in ("position_rmse_ratio", "mean_nees_ratio", "runtime_ratio"):
                  if not math.isfinite(float(row[column])):
                      raise AssertionError(row)
              if row["evidence_source"] == "highres_reference" and not row["reference_rmse_ratio"]:
                  raise AssertionError(row)

          metadata = json.loads(files["metadata"].read_text(encoding="utf-8"))
          if metadata["experiment"] != "s3r3_evidence_summary":
              raise AssertionError(metadata)
          if metadata["claims_rows"] != len(claim_rows):
              raise AssertionError(metadata)

          print(f"Validated {len(claim_rows)} S3R3 evidence claim rows.")
          PY

      - name: Write report summary
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          note = Path(os.environ["OUTPUT_DIR"]) / "s3r3_evidence_summary_note.md"
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(note.read_text(encoding="utf-8"), encoding="utf-8")
          PY

      - name: Upload S3R3 evidence artifact
        uses: actions/upload-artifact@v7
        with:
          name: s3r3-evidence-summary-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
