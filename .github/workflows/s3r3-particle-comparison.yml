name: S3R3 Particle Comparison

permissions:
  contents: read

# jscpd:ignore-start
on:
  workflow_dispatch:
    inputs:
      grid_sizes:
        description: Space-separated quaternion grid sizes.
        required: true
        default: "8 16 32 64"
        type: string
      particle_counts:
        description: Space-separated bootstrap particle-filter particle counts.
        required: true
        default: "128 512 2048 8192"
        type: string
      prior_kappas:
        description: Space-separated orientation-prior kappas; lower is broader.
        required: true
        default: "1.5 3.0 8.0"
        type: string
      body_increment_scales:
        description: Space-separated body-frame displacement scales.
        required: true
        default: "0.5 1.0 1.5"
        type: string
      trials:
        description: Synthetic trials used for each stress scenario.
        required: true
        default: 16
        type: number
      steps:
        description: Prediction/update steps in each trial.
        required: true
        default: 20
        type: number
      seed:
        description: Base random seed for synthetic trial generation.
        required: true
        default: 37
        type: number
      particle_seed:
        description: Base random seed for bootstrap particle filters.
        required: true
        default: 211
        type: number
      cell_sample_count:
        description: Local tangent samples used for each quaternion cell.
        required: true
        default: 27
        type: number
      retention_days:
        description: Days to retain the uploaded report artifact.
        required: true
        default: 30
        type: number
# jscpd:ignore-end

concurrency:
  group: s3r3-particle-comparison-${{ github.ref }}
  cancel-in-progress: false

jobs:
  s3r3-particle-comparison:
    name: Build S3R3 particle comparison
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRID_SIZES: ${{ inputs.grid_sizes }}
      PARTICLE_COUNTS: ${{ inputs.particle_counts }}
      PRIOR_KAPPAS: ${{ inputs.prior_kappas }}
      BODY_INCREMENT_SCALES: ${{ inputs.body_increment_scales }}
      TRIALS: ${{ inputs.trials }}
      STEPS: ${{ inputs.steps }}
      SEED: ${{ inputs.seed }}
      PARTICLE_SEED: ${{ inputs.particle_seed }}
      CELL_SAMPLE_COUNT: ${{ inputs.cell_sample_count }}
      OUTPUT_DIR: results/s3r3_particle_comparison

    steps:
      # jscpd:ignore-start
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # jscpd:ignore-end
      - name: Run and validate particle comparison
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          import subprocess
          import sys
          from pathlib import Path

          def positive_int_list(name):
              values = [int(token) for token in os.environ[name].split()]
              if not values or min(values) <= 0:
                  raise ValueError(f"{name} must contain positive integers.")
              return values

          def positive_float_list(name):
              values = [float(token) for token in os.environ[name].split()]
              if not values or min(values) <= 0.0:
                  raise ValueError(f"{name} must contain positive values.")
              return values

          grid_sizes = positive_int_list("GRID_SIZES")
          particle_counts = positive_int_list("PARTICLE_COUNTS")
          prior_kappas = positive_float_list("PRIOR_KAPPAS")
          body_increment_scales = positive_float_list("BODY_INCREMENT_SCALES")
          for scalar_name in ("TRIALS", "STEPS", "SEED", "PARTICLE_SEED", "CELL_SAMPLE_COUNT"):
              int(os.environ[scalar_name])

          command = [sys.executable, "-m", "se3plusplus_s3f.cli", "s3r3-particle-comparison"]
          command.extend(["--grid-sizes", *(str(value) for value in grid_sizes)])
          command.extend(["--particle-counts", *(str(value) for value in particle_counts)])
          command.extend(["--prior-kappas", *(str(value) for value in prior_kappas)])
          command.extend(["--body-increment-scales", *(str(value) for value in body_increment_scales)])
          command.extend(["--trials", os.environ["TRIALS"], "--steps", os.environ["STEPS"]])
          command.extend(["--seed", os.environ["SEED"], "--particle-seed", os.environ["PARTICLE_SEED"]])
          command.extend(["--cell-sample-count", os.environ["CELL_SAMPLE_COUNT"]])
          command.extend(["--output-dir", os.environ["OUTPUT_DIR"]])
          subprocess.run(command, check=True)

          output_dir = Path(os.environ["OUTPUT_DIR"])
          files = {
              "metrics": output_dir / "s3r3_particle_comparison_metrics.csv",
              "summary": output_dir / "s3r3_particle_comparison_summary.csv",
              "metadata": output_dir / "run_metadata.json",
              "note": output_dir / "s3r3_particle_comparison_note.md",
              "rmse_runtime_plot": output_dir / "s3r3_particle_rmse_runtime.png",
              "best_ratio_plot": output_dir / "s3r3_particle_best_rmse_ratio.png",
              "nearest_ratio_plot": output_dir / "s3r3_particle_nearest_rmse_ratio.png",
          }
          missing = [name for name, path in files.items() if not path.exists()]
          if missing:
              raise FileNotFoundError(missing)

          scenario_count = len(prior_kappas) * len(body_increment_scales)
          expected_metrics = scenario_count * (3 * len(grid_sizes) + len(particle_counts))
          metrics_rows = list(csv.DictReader(files["metrics"].open(newline="", encoding="utf-8")))
          summary_rows = list(csv.DictReader(files["summary"].open(newline="", encoding="utf-8")))
          if len(metrics_rows) != expected_metrics:
              raise AssertionError((len(metrics_rows), expected_metrics))
          if len(summary_rows) != scenario_count:
              raise AssertionError((len(summary_rows), scenario_count))

          filters = {row["filter"] for row in metrics_rows}
          if filters != {"s3f", "particle_filter"}:
              raise AssertionError(filters)
          for row in metrics_rows:
              for column in ("position_rmse", "orientation_error_rad", "mean_nees", "coverage_95", "runtime_ms_per_step"):
                  if not math.isfinite(float(row[column])):
                      raise AssertionError(row)
          for row in summary_rows:
              for column in ("best_particle_rmse_ratio", "best_particle_runtime_ratio", "nearest_particle_rmse_ratio", "nearest_particle_runtime_ratio"):
                  if not math.isfinite(float(row[column])):
                      raise AssertionError(row)

          metadata = json.loads(files["metadata"].read_text(encoding="utf-8"))
          if metadata["experiment"] != "s3r3_particle_comparison":
              raise AssertionError(metadata)
          if metadata["metrics_rows"] != len(metrics_rows) or metadata["summary_rows"] != len(summary_rows):
              raise AssertionError(metadata)

          print(f"Validated {len(metrics_rows)} metric rows and {len(summary_rows)} summary rows.")
          PY

      - name: Write report summary
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          note = Path(os.environ["OUTPUT_DIR"]) / "s3r3_particle_comparison_note.md"
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(note.read_text(encoding="utf-8"), encoding="utf-8")
          PY

      - name: Upload S3R3 particle comparison artifact
        uses: actions/upload-artifact@v7
        with:
          name: s3r3-particle-comparison-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
